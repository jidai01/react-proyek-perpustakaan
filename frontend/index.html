<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PerpusKu - Digital Library</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- DataTables CSS & JS CDN -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.2.1/css/dataTables.dataTables.min.css" />
    <script src="https://cdn.datatables.net/2.2.1/js/dataTables.min.js"></script>

    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
      /* DataTables Premium Overrides with Custom Palette */
      :root {
        --primary-blue: #1883FF;
        --dark-black: #121214;
        --pure-white: #FFFFFF;
      }
      .dt-container { font-family: 'Inter', sans-serif !important; padding: 1rem 0; color: var(--dark-black) !important; }
      .dt-search input { 
        border-radius: 12px !important; 
        padding: 10px 16px !important; 
        border: 1px solid #e5e7eb !important; 
        background-color: #fcfcfc !important;
        color: var(--dark-black);
      }
      table.dataTable { 
        border-radius: 20px !important; 
        overflow: hidden !important; 
        border: 1px solid #f1f1f1 !important;
      }
      table.dataTable thead th {
        background-color: var(--dark-black) !important; /* Header Hitam agar Kontras */
        color: var(--pure-white) !important;
        text-transform: uppercase !important;
        font-size: 11px !important;
        letter-spacing: 0.15em !important;
        font-weight: 800 !important;
        padding: 20px !important;
        border-bottom: none !important;
      }
      table.dataTable tbody td {
        padding: 16px !important;
        border-bottom: 1px solid #f8f8f8 !important;
      }
      .dt-paging-button.current {
        background: var(--primary-blue) !important;
        color: var(--pure-white) !important;
        border: none !important;
        box-shadow: 0 8px 16px -4px rgba(24, 131, 255, 0.4);
      }
    </style>

  </head>


  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
